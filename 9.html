<!DOCTYPE html>
<html>
    <head>
        <title> 9</title>
        <style>
            .oliver,
            .mimi,
            .Rex{
                display:inline-block;
                width: 200px;
                margin-left: 15px;
                box-shadow: 0px 0px 6px rgba(0,0,0,0.3);
                
                vertical-align: top;
                /*height: 330px;*/
            }
           
            .cat{
                width:100%;
                height:200px;
                object-fit:cover;
                
            }
            
            .name{
                font-family:arial;
                font-weight: bold;
                font-size:20px;
                margin-left: 10px;
                margin-bottom: 0px;
            }

            .friend{
                
                margin-top: 2px;
                color: rgb(109, 108, 108);
                font-family: arial;
                font-size: 15px;
                margin-bottom: 0px;
                width:120px;
                display:inline-block;
                vertical-align: top;
            }
            
            .button{
                margin-left:10px;
                padding: 10px;
                width: 110px;
                margin-top: 12px;
                color: white;
                background-color: rgb(103, 137, 228);
                border:none;
                border-radius: 5px;
                margin-bottom: 10px;

            }
            .profilep{
                width:30px;
                height:30px;
                display:inline-block;
                border-radius: 15px;
                margin-right: 5px;
            }
            .mutual{
                margin-top:5px;
                margin-left:10px;
            }

        </style>
    </head>
    <body>
        <div>
            <div class="oliver">
                <div>
                    <img class="cat" src="OIP.webp">
                </div>
                <div>
                    <div><p class="name">Oliver</p></div>
                    <div class="mutual"> 
                        <img class="profilep" src="OIP22.webp">
                        <p class="friend">2 mutual friends</p>
                    </div>
                    
                    <button class="button"> Add Friend</button>
                </div> 
            </div>


            <div class="oliver">
                <div>
                    <img class="cat" src="OIP (1).webp">
                </div>
                <div>
                    <div><p class="name">Mimi</p></div>
                    <div class="mutual"> 
                        <img class="profilep" src="OIP22.webp">
                        <p class="friend">3 mutual friends</p>
                    </div>
                    
                    <button class="button"> Add Friend</button>
                </div> 
            </div>

            <div class="oliver">
                <div>
                    <img class="cat" src="OIP (2).webp">
                </div>
                <div>
                    <div><p class="name">Rex</p></div>
                    <div class="mutual"> 
                        <img class="profilep" src="OIP22.webp">
                        <p class="friend">4 mutual friends</p>
                    </div>
                    
                    <button class="button"> Add Friend</button>
                </div> 
            </div>
        </div>
    </body>
</html>
