<!DOCTYPE html>
<html>
    <head>
        <title> 9</title>
        <style>
            .oliver,
            .mimi,
            .Rex{
                display:inline-block;
                width: 200px;
                margin-left: 15px;
                box-shadow: 0px 0px 6px rgba(0,0,0,0.3);
                
                vertical-align: top;
                /*height: 330px;*/
            }
           
            .cat{
                width:100%;
                height:200px;
                object-fit:cover;
                
            }
            
            .name{
                font-family:arial;
                font-weight: bold;
                font-size:20px;
                margin-left: 10px;
                margin-bottom: 0px;
            }

            .friend{
                margin-left: 10px;
                margin-top: 2px;
                color: rgb(109, 108, 108);
                font-family: arial;
                font-size: 15px;
                margin-bottom: 0px;
            }
            
            .button{
                margin-left:10px;
                padding: 10px;
                width: 110px;
                margin-top: 12px;
                color: white;
                background-color: rgb(103, 137, 228);
                border:none;
                border-radius: 5px;
                margin-bottom: 10px;

            }

        </style>
    </head>
    <body>
        <div class="oliver">
            <img class="cat" src="OIP.webp">
            <p class="name">Oliver</p>
            <p class="friend">2 mutual friends</p>
            <button class="button"> Add Friend</button>

        </div>
        <div class="mimi">
            <img class="cat" src="OIP (1).webp">
            <p class="name">Mimi</p>
            <p class="friend">3 mutual friends</p>
            <button class="button"> Add Friend</button>

        </div>
        <div class="Rex">
            <img class="cat" src="OIP (2).webp">
            <p class="name">Rex</p>
            <p class="friend">4 mutual friends</p>
            <button class="button"> Add Friend</button>


        </div>
    </body>
</html>
