<!-- Style element is not visible on the page-->


<!--
    General Technique
    1) Create Button with HTML
    2) Style with css one-by-one
--> 
   

<!--

   # Class attribute lets us label each HTML element
   # margin key word is to give space btw buttons


-->

<style>
    .B1{
        background-color: rgb(199, 0, 0);
        color: white;
        border: none;
        height: 36px;
        width: 105px;
        border-radius:2px;
        cursor:pointer;
        margin-right: 8px;
    }
    .B2{
        background-color: white ;
        border-color: rgb(32, 100, 247);
        border-style: solid;
        border-width: 1px;
        color: rgb(32, 100, 247);
        height: 36px;
        width: 60px;
        border-radius:2px;
        cursor: pointer;
        margin-right: 8px;
    }

    .B3{
        background-color: rgb(2, 158, 255) ;
        border:none;
        color: rgb(255, 255, 255);
        height: 36px;
        width: 74px;
        border-radius:18px;
        cursor: pointer;
        font-weight: bold;
        font-size: 15px;
        
    }

</style>


<button class="B1">
    SUBSCRIBE
</button>

<button class="B2">
    JOIN
</button>

<button class="B3">
    Tweet
</button>
