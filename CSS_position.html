# CSS Position adds a new dimension to our webpage

properties:-  

position: static; default

top: 0px/10px/...   How far is the top of our element from the browsing window
left: 0px/10px/...  How far is the leftside of our element from the browsing window
bottom:
Right:

What if we set both left and Right:----- The element will stretch
-->

<!--

Position: Fixed  :-- Placed in the browser window (Dont move when we scroll)
Position: Absolute :-- Placed on the  page (Move when we scroll)

Z-index:   The element with higher z-index will appear above the element with 
           lower Z-index

often parent = relative and child=absolute

ie(position:absolute element inside a position:relative element)

-->
