<!DOCTYPE html>
<html>
    <head>
        <title> Position Practice</title>
    </head>
    <body style="
    height:3000px;
    padding-top:60px;
    padding-left:80px;">

        <div style="
        background-color: black;
        color:white;
        position: fixed;
        top:0px;
        left:0px;
        right:0px;
        height:50px;
        "> Header</div>

        <div style="
        background-color: aqua;
        height:200px;
        width:200px;
        ">div1</div>

        <div style="
        background-color: pink;
        height:200px;
        width:200px;
        ">div2</div>

        <div style="
        background-color: rgb(20, 181, 55);
        color:white;
        position:fixed;
        left:0px;
        bottom:0px;
        top:50px;
        width:70px;
        ">sizebar</div>



    </body>
</html>
