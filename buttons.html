<!--
    General Technique
    1) Create Button with HTML
    2) Style with css one-by-one
--> 
   

<!--

   # Class attribute lets us label each HTML element
   # margin key word is to give space btw buttons

-->

<!--
    # Instead of adding height /width of the botton we add padding to the text in it
      and let the botton auto adjust it;
-->

<!--
    The elements which are not visible on the web page(Css style) go in
    the head,

    The elements visible on the web page go in the body
-->

<!--
VOID ELEMENTS
     These elements dont need a closing tag
      Ex:- <link> :- We use to link css file to html file
-->

<!DOCTYPE html>
<html>
    <head>
        <title> BUTTONS </title>
        <link rel="stylesheet" href="buttons.css">        
    </head>
    <body>
        <button class="B1">
          SUBSCRIBE
        </button>

        <button class="B2">
          JOIN
        </button>

        <button class="B3">
          Tweet
        </button>
    </body>
</html>
