<!DOCTYPE html>

<html>
    <head>
        <style>
            p{
                margin: 0px;
            }
            .cat{
                width: 100px;
                margin-left: 300px;
                margin-top:  20px;
                object-fit: cover;
                border-radius:100px;
                object-position: center;
            }
            .Name{
                font-family: arial;
                font-size: 20px;
                margin-bottom: 10px;
                text-decoration: underline;
                
            }
            .inname{
                padding-top:5px;
                padding-bottom:5px;
                font-size: 20px;
            }
            .google{
                margin-top: 30px;
                font-size: 20px;
            }
            .google_icon{
                width: 40px;
                margin-top: 20px;
            }
            .searchbox{
                width: 500px;
                height: 40px;
                border: none;
                border-radius: 25px;
                padding-left: 15px;
                box-shadow: 0 1px 6px rgba(0, 0, 0, 0.2);
            }
            .suscat{
                width: 70px;
                vertical-align: bottom;
            }
        </style>

    </head>
    <body>
        <img class="cat" src="download.webp">
        <p class ="Name"> Enter Your Name:-</p>
        <input class="inname" type="text" placeholder="Search">
        <p class="google">Google</p>
        <img class="google_icon" src="download (1).webp">
        <input class="searchbox" type="text" placeholder="Search Google or type a URL">
        <img class="suscat" src="suscat.webp">
        
    </body>
</html>
