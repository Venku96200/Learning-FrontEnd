<!DOCTYPE html>
<html>
    <head>
        <title> Exercise 15</title>
        <style>
            .thumnail{
                width:320px;
                height:180px;
                background-color: rgba(192, 190, 190,0.7);
                margin-left:300px;
                margin-top:400px;
                
            }
            .button{
                background-color: black;
                color:white;
                font-family:roboto,arial;
                font-size:20px;
                width:40px;
                height:40px;
                border-radius:20px;
                z-index:100;
                position: absolute;
                top:-16px;
                left:-16px;
                border-style: solid;
            }
            .button:hover{
                opacity:0.7;
            }
            .button:active{
                opacity:0.4;
            }
            .time-stamp{
                display:inline-block;
                position:absolute;
                top:155px;
                right:7px;
                background-color: black;
                color:white;
                padding-right:3px;
                padding-left:3px;
            }
        </style>
    </head>
    <body style="height:3000px;">
        <div class="thumnail">
            <button class="button"> X </button>
            <div class="time-stamp">0:29</div>
        </div>
    </body>
</html>
